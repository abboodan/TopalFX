name: Automated Release & Dokploy Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease

      - name: Extract Version Details
        id: version_info
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F '"' '{print $2}')
          VERSION_CODE=$(grep "versionCode =" app/build.gradle.kts | awk '{print $3}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Generate version.json
        run: |
          cat <<EOF > version.json
          {
            "versionCode": ${{ env.VERSION_CODE }},
            "versionName": "${{ env.VERSION_NAME }}",
            "apkUrl": "https://fx.topal.uk/TopalFX-latest.apk",
            "changelog": "إصدار جديد v${{ env.VERSION_NAME }} يتضمن تحسينات وتحديثات تلقائية"
          }
          EOF

      - name: Deploy APK & Manifest to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "app/build.gradle.kts,app/build/outputs/apk/release/app-release.apk,version.json"
          target: "/var/www/fx.topal.uk/"
          strip_components: 4
